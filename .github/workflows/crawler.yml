name: Dilly Medical — refresh opportunities

on:
  schedule:
    - cron: '0 14 * * *'  # daily 14:00 UTC
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh live opportunities
        run: |
          curl -sf -X POST "${{ secrets.DILLY_MED_API_URL }}/cron/refresh-opportunities" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
        continue-on-error: true
